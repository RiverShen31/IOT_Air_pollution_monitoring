# Render Blueprint — cho phép tạo service bằng 1 cú click ("New > Blueprint" trên Render,
# trỏ vào repo này) thay vì điền form thủ công. Các biến đánh dấu `sync: false` phải điền tay
# trên dashboard sau khi tạo (giá trị bí mật, không nên commit vào git).
# Xem hướng dẫn đầy đủ ở docs/DEPLOYMENT.md.

services:
  - type: web
    name: air-pollution-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: MQTT_URL
        sync: false
      - key: MQTT_USERNAME
        sync: false
      - key: MQTT_PASSWORD
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES_DAYS
        value: "7"
      - key: CORS_ORIGIN
        sync: false
