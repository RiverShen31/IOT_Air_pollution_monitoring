# Mosquitto MQTT Broker config - môi trường giả lập (dev)
#
# Production: thêm 1 listener 8883 với cert TLS (certfile/keyfile/cafile)
# và đổi require_certificate / sang mqtts:// cho thiết bị thật.

listener 1883
protocol mqtt

allow_anonymous false
password_file /mosquitto/config/password_file
acl_file /mosquitto/config/acl.conf

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice

# Giới hạn kích thước message để chống abuse từ thiết bị giả mạo
message_size_limit 8192
