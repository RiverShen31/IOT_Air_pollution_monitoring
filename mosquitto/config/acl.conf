# MQTT Access Control List
# Nguyên tắc: mỗi thiết bị chỉ được publish vào đúng namespace devices/{deviceId}/...
# của chính nó. Backend có quyền đọc (subscribe) toàn bộ. Không ai được đọc dữ liệu
# của thiết bị khác -> cách ly dữ liệu (data isolation) ngay tại tầng giao thức.
#
# File này được nạp lại khi container mosquitto restart. Khi tạo thiết bị mới qua
# script mosquitto/config/add-device.sh, một khối "user <deviceId>" mới sẽ được
# append vào cuối file.

# ---- Backend service account: subscribe toàn bộ telemetry/status ----
user backend
topic read devices/#

# ---- Demo devices (tạo sẵn để chạy thử ngay, xem README.md gốc) ----
user AQ-DEVICE-01
topic write devices/AQ-DEVICE-01/telemetry
topic readwrite devices/AQ-DEVICE-01/status

user AQ-DEVICE-WOKWI-01
topic write devices/AQ-DEVICE-WOKWI-01/telemetry
topic readwrite devices/AQ-DEVICE-WOKWI-01/status
